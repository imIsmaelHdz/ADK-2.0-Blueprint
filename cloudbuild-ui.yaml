steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.ui
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/adk2-repo/chatbot-ui:latest
      - .

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/adk2-repo/chatbot-ui:latest

options:
  logging: CLOUD_LOGGING_ONLY
