steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/adk2-repo/travel-helper-api:latest
      - .

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/adk2-repo/travel-helper-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
